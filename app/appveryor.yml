version: 1.0.{build}

image: Visual Studio 2022

environment:
  DOTNET_VERSION: 10.0.x

install:
  - cmd: choco install dotnet-sdk --version=10.0.0 -y
  - cmd: dotnet tool restore

build_script:
  - cmd: dotnet cake --target=Full

artifacts:
  - path: docs-site.zip
    name: Documentation
  - path: TestResults\*.trx
    name: TestResults

on_failure:
  - cmd: echo "Build failed — check the logs above"

notifications:
  - provider: Email
    to:
      - you@example.com
    on_build_success: false
    on_build_failure: true
    on_build_status_changed: true
