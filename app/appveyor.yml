version: 1.0.{build}

image: Visual Studio 2022

init:
  - ps: |
      Invoke-WebRequest -Uri https://dot.net/v1/dotnet-install.ps1 -OutFile dotnet-install.ps1
      .\dotnet-install.ps1 -Channel 10.0 -InstallDir "C:\Program Files\dotnet"
      $env:DOTNET_ROOT = "C:\Program Files\dotnet"
      $env:PATH = "C:\Program Files\dotnet;" + $env:PATH
      [Environment]::SetEnvironmentVariable("DOTNET_ROOT", $env:DOTNET_ROOT, "Machine")
      [Environment]::SetEnvironmentVariable("PATH", $env:PATH, "Machine")
      dotnet --list-sdks

install:
  - cmd: dotnet tool restore

build_script:
  - cmd: dotnet cake --target=Full

artifacts:
  - path: docs-site.zip
    name: Documentation
  - path: TestResults\*.trx
    name: TestResults

on_failure:
  - cmd: echo "Build failed — check the logs above"

notifications:
  - provider: Email
    to:
      - you@example.com
    on_build_success: false
    on_build_failure: true
    on_build_status_changed: true
