version: 1.0.{build}

image: Visual Studio 2022

build: off

install:
  - ps: |
      Invoke-WebRequest -Uri https://dot.net/v1/dotnet-install.ps1 -OutFile dotnet-install.ps1
      .\dotnet-install.ps1 -Channel 10.0 -InstallDir "C:\Program Files\dotnet"
      [Environment]::SetEnvironmentVariable("DOTNET_ROOT", "C:\Program Files\dotnet", "Machine")
      [Environment]::SetEnvironmentVariable("PATH", "C:\Program Files\dotnet;" + [Environment]::GetEnvironmentVariable("PATH", "Machine"), "Machine")
  - cmd: refreshenv
  - cmd: dotnet --list-sdks
  - cmd: dotnet --version
  - cmd: cd app && dotnet tool restore

build_script:
  - cmd: refreshenv
  - cmd: cd app && dotnet cake --target=Full

artifacts:
  - path: app\docs-site.zip
    name: Documentation
  - path: app\TestResults\*.trx
    name: TestResults

on_failure:
  - cmd: echo "Build failed — check the logs above"

notifications:
  - provider: Email
    to:
      - you@example.com
    on_build_success: false
    on_build_failure: true
    on_build_status_changed: true